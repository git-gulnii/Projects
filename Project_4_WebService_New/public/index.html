<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Web Service App</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="header">
    <div class="container">
      <h1>YouTube Web Service App</h1>
      <p>Real API-based video data using Node.js and Express</p>
    </div>
  </header>

  <section class="controls container">
    <input type="text" id="search" placeholder="Search video..." />
    <select id="filter">
      <option value="all">All Categories</option>
      <option value="Multimedia">Multimedia</option>
      <option value="Mobile">Mobile</option>
      <option value="Testing">Testing</option>
    </select>
  </section>

  <section class="container">
    <div id="services-container" class="grid"></div>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
