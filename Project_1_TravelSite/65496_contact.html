<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoTravelGo | Contact</title>
  <link rel="stylesheet" href="65496_CSS/style.css" />
</head>
<body>

  <header class="header">
    <nav class="navbar container">
      <div class="logo">GoTravelGo</div>

      <ul class="nav-links">
        <li><a href="65496_index.html">Home</a></li>
        <li><a href="65496_tours.html">Tours</a></li>
        <li><a href="65496_about.html">About</a></li>
        <li><a href="65496_contact.html">Contact</a></li>
      </ul>

      <div class="menu-toggle" id="menu-toggle">☰</div>
    </nav>
  </header>

  <main>
    <section class="page-banner small-banner">
      <div class="container">
        <h1>Contact Us</h1>
        <p>Send us a message and we will get back to you as soon as possible.</p>
      </div>
    </section>

    <section class="contact-section container">
      <div class="contact-wrapper">
        <div class="contact-info">
          <h2>Get in Touch</h2>
          <p><strong>Email:</strong> info@gotravelgo.com</p>
          <p><strong>Phone:</strong> +90 555 123 45 67</p>
          <p><strong>Address:</strong> Istanbul, Türkiye</p>
        </div>

        <form class="contact-form" id="contact-form">
          <input type="text" id="name" placeholder="Your Name" />
          <input type="email" id="email" placeholder="Your Email" />
          <textarea id="message" rows="6" placeholder="Your Message"></textarea>
          <button type="submit" class="btn">Send Message</button>
          <p id="form-message"></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 GoTravelGo. All Rights Reserved.</p>
    </div>
  </footer>

  <script src="65496_JS/script.js"></script>
</body>
</html>
